; TTGO T-Display ESP32 — 240x135 ST7789 LCD
; All TFT_eSPI pin config baked in via build_flags so any clone builds identically.

[env:lilygo-t-display]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 460800

build_flags =
  -DCORE_DEBUG_LEVEL=3
  ; --- TFT_eSPI configuration (overrides User_Setup.h) ---
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=135
  -DTFT_HEIGHT=240
  -DTFT_MISO=-1
  -DTFT_MOSI=19
  -DTFT_SCLK=18
  -DTFT_CS=5
  -DTFT_DC=16
  -DTFT_RST=23
  -DTFT_BL=4
  -DTFT_BACKLIGHT_ON=HIGH
  -DTOUCH_CS=-1
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=40000000

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.0.0
