services:
  monitor:
    build: .
    image: esp32-token-monitor-service:latest
    container_name: esp32-token-monitor
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: "8787"
      CREDENTIALS_FILE: /run/secrets/credentials.json
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/netskope-ca.pem
      UPSTREAM_CACHE_TTL_MS: "60000"
      LOG_LEVEL: info
    volumes:
      - ./.secrets/credentials.json:/run/secrets/credentials.json:rw
      - /usr/local/share/netskope-cert-bundle.pem:/etc/ssl/certs/netskope-ca.pem:ro
    networks: [shared]

networks:
  shared:
    name: esp32-monitor-shared
    external: true
