server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Reverse-proxy /api/* to the service container on the shared network.
  # Container name "monitor" matches services.monitor in service/docker-compose.yml.
  location /api/ {
    proxy_pass         http://monitor:8787/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
  }

  # Tiny health probe for `docker compose up`.
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
